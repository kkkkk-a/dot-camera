<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ラインヴァニッシュ - QR Edition</title>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- QR Code Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-color: #0a0b10;
    --panel-bg: rgba(20, 25, 35, 0.95);
    --primary-x: #00f2ff;
    --primary-o: #ff0055;
    --accent-gold: #ffd700;
    --text-color: #e0e6ed;
    --glass-border: 1px solid rgba(255, 255, 255, 0.15);
    --neon-shadow-x: 0 0 10px rgba(0, 242, 255, 0.6);
    --neon-shadow-o: 0 0 10px rgba(255, 0, 85, 0.6);
}

body {
    font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
    background: radial-gradient(circle at center, #1a1f2c 0%, #050505 100%);
    color: var(--text-color);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0; overflow: hidden;
    touch-action: manipulation; user-select: none;
}

.bg-grid {
    position: absolute; width: 200%; height: 200%;
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
    animation: gridMove 20s linear infinite; z-index: -1; pointer-events: none;
}
@keyframes gridMove {
    0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
    100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
}

.container {
    position: relative; background: var(--panel-bg);
    padding: 30px; border-radius: 20px;
    backdrop-filter: blur(10px); border: var(--glass-border);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    width: 400px; max-width: 95vw; text-align: center;
}

h1 {
    font-size: 24px; letter-spacing: 3px; margin: 0 0 20px 0;
    text-transform: uppercase; background: linear-gradient(90deg, #fff, #aaa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
}

/* HUD */
.hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.player-stats {
    width: 35%; padding: 8px; border-radius: 8px;
    background: rgba(0,0,0,0.4); border: 1px solid transparent; transition: all 0.3s;
}
.player-stats.active-x { border-color: var(--primary-x); box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2); transform: scale(1.05); }
.player-stats.active-o { border-color: var(--primary-o); box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.2); transform: scale(1.05); }
.player-stats.inactive { opacity: 0.4; filter: grayscale(0.8); }

.p-name { font-size: 12px; margin-bottom: 5px; display: block; font-weight: bold; }
.p-x { color: var(--primary-x); }
.p-o { color: var(--primary-o); }
.you-indicator { font-size: 9px; background: #fff; color: #000; padding: 1px 3px; border-radius: 3px; margin-left: 4px; display: none; vertical-align: middle; }

.hp-bar-container { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
.hp-bar { height: 100%; width: 100%; transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
.hp-x { background: var(--primary-x); box-shadow: 0 0 8px var(--primary-x); }
.hp-o { background: var(--primary-o); box-shadow: 0 0 8px var(--primary-o); }

/* Timer */
.timer-box { width: 20%; text-align: center; }
.timer {
    font-size: 2rem; font-weight: bold; color: var(--accent-gold);
    text-shadow: 0 0 10px var(--accent-gold); line-height: 1;
}
.timer.warning { color: var(--primary-o); animation: blink-warn 0.5s infinite alternate; }
@keyframes blink-warn { from { opacity: 1; text-shadow: 0 0 15px red; } to { opacity: 0.5; } }

/* Board */
#game-board {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    margin: 0 auto 20px; width: 100%; aspect-ratio: 1;
    position: relative;
}
/* 相手ターン時の操作ブロック用 */
#game-board.blocked { pointer-events: none; opacity: 0.8; }
#game-board.blocked::after {
    content: "WAIT"; position: absolute; top:50%; left:50%; transform: translate(-50%, -50%);
    font-size: 3rem; color: rgba(255,255,255,0.1); font-weight: 900; z-index: 0; pointer-events: none;
}

.cell {
    background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px; display: flex; justify-content: center; align-items: center;
    font-size: 3.5rem; font-weight: 900; cursor: pointer; position: relative; overflow: hidden;
    transition: 0.2s; z-index: 1;
}
.cell:active { transform: scale(0.95); }
.cell.taken { cursor: default; }
.cell.x { color: var(--primary-x); text-shadow: var(--neon-shadow-x); }
.cell.o { color: var(--primary-o); text-shadow: var(--neon-shadow-o); }

/* 次に消えるマスの予告 */
.cell.fading { border-color: rgba(255, 0, 0, 0.5); animation: pulse-border 1.5s infinite; }
.cell.fading::before {
    content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
    box-shadow: inset 0 0 15px rgba(255,0,0,0.3); pointer-events: none;
}
@keyframes pulse-border { 0% { border-color: rgba(255,0,0,0.3); } 100% { border-color: rgba(255,0,0,0.8); } }

/* Status & Buttons */
#status-display { font-size: 14px; color: #888; margin-bottom: 15px; min-height: 20px; font-weight: bold; }

.btn-group { display: flex; justify-content: center; gap: 10px; }
.btn {
    background: rgba(0,0,0,0.6); border: 1px solid var(--accent-gold); color: var(--accent-gold);
    padding: 10px 20px; font-family: 'Orbitron'; font-size: 0.9rem; font-weight: bold;
    cursor: pointer; transition: 0.3s; flex: 1;
}
.btn:hover { background: var(--accent-gold); color: #000; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: #555; color: #555; background: transparent; }
.btn-back { border-color: #666; color: #aaa; }
.btn-back:hover { background: #666; color: #fff; }

/* Overlay Menus */
.overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #0a0b10; z-index: 50; border-radius: 20px;
    display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
}
.menu-content { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }

/* QR Styles */
#qrcode-display { background: #fff; padding: 10px; border-radius: 8px; margin: 10px 0; }
#qrcode-display img { display: block; }
#qr-reader { width: 100%; max-width: 250px; border: 1px solid var(--primary-x); display: none; margin-bottom: 10px; }

.input-group { display: flex; gap: 5px; width: 100%; justify-content: center; }
input[type="text"] {
    background: #111; border: 1px solid #444; color: white; padding: 10px;
    font-family: 'Roboto Mono'; width: 60%; text-align: center; border-radius: 4px;
}
.id-box { 
    background: #000; color: var(--primary-x); padding: 8px; border: 1px dashed #444; 
    font-family: monospace; font-size: 12px; margin: 5px 0; width: 100%; box-sizing: border-box; word-break: break-all;
}

.blink { animation: blink 1s infinite alternate; }
@keyframes blink { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div class="container" id="game-container">
    
    <!-- メニュー画面 -->
    <div id="menu-overlay" class="overlay">
        <div id="main-menu" class="menu-content">
            <h2 style="font-family:'Orbitron'; letter-spacing:2px; margin-bottom:5px;">LINE VANISH</h2>
            <div style="font-size:0.7rem; color:#666; margin-bottom:20px;">QR CONNECT EDITION</div>
            
            <button class="btn" onclick="Game.initHost()">ルーム作成 (HOST)</button>
            <div style="font-size:0.8rem; color:#444;">OR</div>
            
            <div id="qr-reader"></div> <!-- カメラ映像 -->
            
            <div class="input-group">
                <input type="text" id="join-id" placeholder="HOST ID">
                <button class="btn" style="padding:10px; flex:0;" onclick="Game.toggleScanner()">📷</button>
            </div>
            <button class="btn" onclick="Game.joinRoom()">ID入力で参加</button>
            
            <div style="margin-top:15px; width:100%; border-top:1px solid #333;"></div>
            <button class="btn btn-back" style="margin-top:10px;" onclick="Game.initLocal()">オフライン (1人/対面)</button>
        </div>

        <div id="host-screen" class="menu-content" style="display:none;">
            <p style="font-size:0.9rem;">QRコードを読み取ってください</p>
            <div id="qrcode-display"></div>
            <div id="host-id-text" class="id-box">GENERATING...</div>
            <div class="blink" style="color:var(--accent-gold); font-size:0.8rem;">接続待ち...</div>
            <button class="btn btn-back" onclick="location.reload()">キャンセル</button>
        </div>

        <div id="loading-screen" class="menu-content" style="display:none;">
            <div class="blink" style="color:var(--primary-x)">CONNECTING...</div>
        </div>
    </div>

    <!-- ゲーム画面 -->
    <h1>NEO TACTICS</h1>

    <div class="hud">
        <div class="player-stats active-x" id="p-x">
            <span class="p-name p-x">PLAYER X <span id="you-x" class="you-indicator">YOU</span></span>
            <div class="hp-bar-container"><div class="hp-bar hp-x" id="hp-x-bar"></div></div>
        </div>
        
        <div class="timer-box">
            <div id="timer" class="timer">15</div>
        </div>

        <div class="player-stats" id="p-o">
            <span class="p-name p-o">PLAYER O <span id="you-o" class="you-indicator">YOU</span></span>
            <div class="hp-bar-container"><div class="hp-bar hp-o" id="hp-o-bar"></div></div>
        </div>
    </div>

    <div id="status-display">READY</div>

    <div id="game-board"></div>

    <div class="btn-group">
        <button id="btn-rematch" class="btn" style="display:none;" onclick="Game.requestRematch()">再戦する</button>
        <button id="btn-quit" class="btn btn-back" style="display:none;" onclick="Game.quit()">終了</button>
    </div>
</div>

<script>
// --- Audio Manager ---
const AudioSys = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if(this.ctx.state === 'suspended') this.ctx.resume(); },
    play(type) {
        if(!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        const t = this.ctx.currentTime;
        
        if (type === 'click') {
            osc.frequency.setValueAtTime(1000, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.start(); osc.stop(t + 0.1);
        } else if (type === 'place') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, t);
            osc.frequency.linearRampToValueAtTime(800, t + 0.1);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.2);
            osc.start(); osc.stop(t + 0.2);
        } else if (type === 'vanish') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, t);
            osc.frequency.exponentialRampToValueAtTime(50, t + 0.4);
            gain.gain.setValueAtTime(0.2, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(); osc.stop(t + 0.4);
        } else if (type === 'damage') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, t);
            osc.frequency.setValueAtTime(50, t + 0.1);
            gain.gain.setValueAtTime(0.3, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.3);
            osc.start(); osc.stop(t + 0.3);
        } else if (type === 'win') {
            osc.type = 'triangle';
            [0, 0.15, 0.3].forEach((dt, i) => {
                const o = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                o.frequency.setValueAtTime(523 + (i*100), t+dt);
                g.gain.setValueAtTime(0.1, t+dt);
                g.gain.linearRampToValueAtTime(0, t+dt+0.4);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(t+dt); o.stop(t+dt+0.4);
            });
            return;
        }
        osc.connect(gain); gain.connect(this.ctx.destination);
    }
};

// --- Game Logic ---
const Game = {
    // State
    mode: 'local', // 'local' or 'online'
    role: null,    // 'X', 'O', or null (local)
    isHost: false,
    peer: null, conn: null, scanner: null,
    
    board: Array(9).fill(""),
    turn: 'X',
    moves: { 'X': [], 'O': [] },
    hp: { 'X': 3, 'O': 3 },
    isPlaying: false,
    
    timer: 15, timerId: null,
    rematchState: { me: false, opp: false },

    // Init Methods
    initLocal() {
        AudioSys.init();
        this.mode = 'local';
        this.role = null;
        this.startGame();
    },

    initHost() {
        AudioSys.init();
        this.showScreen('host-screen');
        this.peer = new Peer();
        this.peer.on('open', id => {
            document.getElementById('host-id-text').innerText = id;
            this.isHost = true;
            this.role = 'X'; // Host is X
            
            // QR Code Gen
            const qrContainer = document.getElementById('qrcode-display');
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: id, width: 128, height: 128 });
        });
        this.peer.on('connection', c => {
            this.conn = c;
            this.setupConn();
        });
    },

    toggleScanner() {
        const box = document.getElementById('qr-reader');
        if(box.style.display === 'block') {
            if(this.scanner) this.scanner.clear();
            box.style.display = 'none';
        } else {
            box.style.display = 'block';
            this.scanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: 200 });
            this.scanner.render((decoded) => {
                document.getElementById('join-id').value = decoded;
                AudioSys.play('click');
                this.scanner.clear();
                box.style.display = 'none';
                this.joinRoom();
            });
        }
    },

    joinRoom() {
        const id = document.getElementById('join-id').value;
        if(!id) return alert("IDを入力");
        AudioSys.init();
        if(this.scanner) this.scanner.clear();
        this.showScreen('loading-screen');
        
        this.peer = new Peer();
        this.peer.on('open', () => {
            this.conn = this.peer.connect(id);
            this.isHost = false;
            this.role = 'O'; // Guest is O
            this.setupConn();
        });
        this.peer.on('error', () => { alert("接続失敗"); location.reload(); });
    },

    setupConn() {
        this.conn.on('open', () => {
            if(!this.isHost) this.mode = 'online';
            else this.mode = 'online';
            this.startGame();
        });
        this.conn.on('data', d => this.handleData(d));
        this.conn.on('close', () => { alert("切断されました"); location.reload(); });
    },

    send(type, payload) {
        if(this.conn && this.conn.open) this.conn.send({type, payload});
    },

    showScreen(id) {
        document.querySelectorAll('.menu-content').forEach(e => e.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    },

    // Game Flow
    startGame() {
        document.getElementById('menu-overlay').style.display = 'none';
        this.resetState();
        this.renderBoard();
        this.updateUI();
        this.startTurn();
    },

    resetState() {
        this.board.fill("");
        this.moves = { 'X': [], 'O': [] };
        this.hp = { 'X': 3, 'O': 3 };
        this.turn = 'X';
        this.isPlaying = true;
        this.rematchState = { me: false, opp: false };
        
        // UI Reset
        document.getElementById('btn-rematch').style.display = 'none';
        document.getElementById('btn-quit').style.display = 'none';
        document.getElementById('btn-rematch').disabled = false;
        document.getElementById('btn-rematch').innerText = "再戦する";
        document.getElementById('game-board').classList.remove('blocked');
        
        // Indicators
        if(this.mode === 'online') {
            document.getElementById('you-x').style.display = (this.role === 'X') ? 'inline' : 'none';
            document.getElementById('you-o').style.display = (this.role === 'O') ? 'inline' : 'none';
            document.getElementById('btn-quit').style.display = 'inline-block';
        }
    },

    startTurn() {
        if(!this.isPlaying) return;
        
        this.startTimer();
        this.updateUI();
        
        // Turn control
        if(this.mode === 'online' && this.turn !== this.role) {
            document.getElementById('game-board').classList.add('blocked');
            this.setStatus("相手のターン...");
        } else {
            document.getElementById('game-board').classList.remove('blocked');
            this.setStatus(this.mode === 'local' ? `PLAYER ${this.turn} のターン` : "あなたのターン");
        }
    },

    clickCell(i) {
        if(!this.isPlaying || this.board[i] !== "") return;
        // Online check
        if(this.mode === 'online' && this.turn !== this.role) return;

        this.processMove(i);
        if(this.mode === 'online') this.send('move', { index: i });
    },

    processMove(i) {
        // FIFO Logic
        if(this.moves[this.turn].length >= 3) {
            const old = this.moves[this.turn].shift();
            this.board[old] = "";
            AudioSys.play('vanish');
        }

        this.board[i] = this.turn;
        this.moves[this.turn].push(i);
        AudioSys.play('place');
        
        this.renderBoard();
        this.checkWin();
    },

    checkWin() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        let damage = 0;
        
        wins.forEach(line => {
            if(line.every(idx => this.board[idx] === this.turn)) damage++;
        });

        if(damage > 0) {
            this.applyDamage(damage);
        } else {
            this.switchTurn();
        }
    },

    applyDamage(dmg) {
        const opp = this.turn === 'X' ? 'O' : 'X';
        this.hp[opp] -= dmg;
        if(this.hp[opp] < 0) this.hp[opp] = 0;
        AudioSys.play('damage');
        this.updateUI();

        if(this.hp[opp] === 0) {
            this.endGame(this.turn);
        } else {
            this.setStatus(`クリティカル！ ${dmg} ダメージ！`);
            // Block input briefly
            document.getElementById('game-board').classList.add('blocked');
            setTimeout(() => this.switchTurn(), 1000);
        }
    },

    switchTurn() {
        if(!this.isPlaying) return;
        this.turn = this.turn === 'X' ? 'O' : 'X';
        this.startTurn();
    },

    // Timer Logic
    startTimer() {
        if(this.timerId) clearInterval(this.timerId);
        this.timer = 15;
        const el = document.getElementById('timer');
        el.innerText = this.timer;
        el.classList.remove('warning');

        this.timerId = setInterval(() => {
            this.timer--;
            el.innerText = this.timer;
            if(this.timer <= 5) el.classList.add('warning');
            
            if(this.timer <= 0) {
                clearInterval(this.timerId);
                // Time out logic
                if(this.mode === 'local') {
                    this.endGame(this.turn === 'X' ? 'O' : 'X');
                } else {
                    // Only current player sends timeout to avoid sync issues
                    if(this.turn === this.role) {
                        this.send('timeout', {});
                        this.endGame(this.turn === 'X' ? 'O' : 'X');
                    }
                }
            }
        }, 1000);
    },

    endGame(winner) {
        this.isPlaying = false;
        clearInterval(this.timerId);
        document.getElementById('game-board').classList.add('blocked');
        this.setStatus(winner === this.role ? "YOU WIN!" : `PLAYER ${winner} WINS!`);
        if(this.mode === 'local') this.setStatus(`PLAYER ${winner} WINS!`);
        
        AudioSys.play('win');
        document.getElementById('btn-rematch').style.display = 'inline-block';
        if(this.mode === 'local') document.getElementById('btn-quit').style.display = 'inline-block';
    },

    // Rematch Logic
    requestRematch() {
        if(this.mode === 'local') {
            this.resetState();
            this.startGame();
            return;
        }
        
        this.rematchState.me = true;
        document.getElementById('btn-rematch').disabled = true;
        document.getElementById('btn-rematch').innerText = "承認待ち...";
        this.send('rematch_req', {});
        this.checkRematchStart();
    },

    checkRematchStart() {
        if(this.rematchState.me && this.rematchState.opp) {
            this.setStatus("再戦開始！");
            setTimeout(() => {
                this.resetState();
                this.startGame();
            }, 500);
        } else if (this.rematchState.me) {
            this.setStatus("相手の応答を待っています...");
        }
    },

    quit() {
        location.reload();
    },

    // Network Handler
    handleData(d) {
        if(d.type === 'move') {
            this.processMove(d.payload.index);
        } else if(d.type === 'timeout') {
            this.endGame(this.turn === 'X' ? 'O' : 'X');
        } else if(d.type === 'rematch_req') {
            this.rematchState.opp = true;
            if(this.rematchState.me) {
                this.checkRematchStart();
            } else {
                this.setStatus("相手が再戦を希望しています");
                // ボタンを目立たせる等の処理も可能
            }
        }
    },

    // Render / UI
    renderBoard() {
        const boardEl = document.getElementById('game-board');
        boardEl.innerHTML = "";
        
        // Find fading cells (next to vanish)
        let fadingIdx = -1;
        if(this.moves[this.turn].length >= 3) {
            fadingIdx = this.moves[this.turn][0];
        }

        this.board.forEach((val, i) => {
            const cell = document.createElement('div');
            cell.className = `cell ${val ? val.toLowerCase() + ' taken' : ''}`;
            cell.innerText = val;
            
            // Fading visual only for current player's next vanish
            // But visually it's helpful to see fading for both
            const xFade = (this.moves['X'].length >= 3 && this.moves['X'][0] === i);
            const oFade = (this.moves['O'].length >= 3 && this.moves['O'][0] === i);
            if(xFade || oFade) cell.classList.add('fading');

            cell.onclick = () => this.clickCell(i);
            boardEl.appendChild(cell);
        });
    },

    updateUI() {
        const pX = document.getElementById('p-x');
        const pO = document.getElementById('p-o');
        
        if(this.turn === 'X') {
            pX.classList.add('active-x'); pX.classList.remove('inactive');
            pO.classList.remove('active-o'); pO.classList.add('inactive');
        } else {
            pX.classList.remove('active-x'); pX.classList.add('inactive');
            pO.classList.add('active-o'); pO.classList.remove('inactive');
        }

        document.getElementById('hp-x-bar').style.width = (this.hp['X'] / 3 * 100) + "%";
        document.getElementById('hp-o-bar').style.width = (this.hp['O'] / 3 * 100) + "%";
    },

    setStatus(msg) {
        document.getElementById('status-display').innerText = msg;
    }
};
</script>
</body>
</html>
