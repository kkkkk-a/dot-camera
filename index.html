<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ラインヴァニッシュ</title>
    <!-- PeerJS CDN (通信用ライブラリ) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Google Fonts (日本語フォント追加) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-color: #0a0b10;
    --panel-bg: rgba(20, 25, 35, 0.9);
    --primary-x: #00f2ff;
    --primary-o: #ff0055;
    --accent-gold: #ffd700;
    --text-color: #e0e6ed;
    --glass-border: 1px solid rgba(255, 255, 255, 0.1);
    --neon-shadow-x: 0 0 10px rgba(0, 242, 255, 0.5);
    --neon-shadow-o: 0 0 10px rgba(255, 0, 85, 0.5);
}

body {
    font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
    background: radial-gradient(circle at center, #1a1f2c 0%, #050505 100%);
    color: var(--text-color);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
}

.bg-grid {
    position: absolute; width: 200%; height: 200%;
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
    animation: gridMove 20s linear infinite;
    z-index: -1; pointer-events: none;
}
@keyframes gridMove {
    0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
    100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
}

.container {
    position: relative; background: var(--panel-bg);
    padding: 40px; border-radius: 20px;
    backdrop-filter: blur(10px); border: var(--glass-border);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    width: 400px; max-width: 90vw; text-align: center;
}

h1 {
    font-size: 24px; letter-spacing: 3px; margin-bottom: 20px;
    text-transform: uppercase; background: linear-gradient(90deg, #fff, #888);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
}

.hud {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px; font-family: 'Noto Sans JP', sans-serif;
}
.player-stats {
    width: 40%; padding: 10px; border-radius: 8px;
    background: rgba(0,0,0,0.3); border: 1px solid transparent; transition: all 0.3s;
}
.player-stats.active-x { border-color: var(--primary-x); box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2); }
.player-stats.active-o { border-color: var(--primary-o); box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.2); }

.p-name { font-size: 14px; margin-bottom: 5px; display: block; font-weight: bold; }
.p-x { color: var(--primary-x); }
.p-o { color: var(--primary-o); }
.you-indicator { font-size: 10px; background: #fff; color: #000; padding: 2px 4px; border-radius: 4px; margin-left: 5px; display: none; font-weight: bold;}
.hp-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
.hp-bar { height: 100%; width: 100%; transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
.hp-x { background: var(--primary-x); box-shadow: 0 0 10px var(--primary-x); }
.hp-o { background: var(--primary-o); box-shadow: 0 0 10px var(--primary-o); }

/* --- タイマースタイル --- */
.timer {
    font-family: 'Orbitron', sans-serif; font-size: 2rem;
    font-weight: bold; color: var(--accent-gold);
    text-shadow: 0 0 10px var(--accent-gold);
    transition: color 0.3s, text-shadow 0.3s;
}
.timer.warning { color: var(--primary-o); text-shadow: 0 0 10px var(--primary-o); animation: blink-warning 0.5s infinite alternate; }
@keyframes blink-warning { from { opacity: 1; } to { opacity: 0.6; } }

#game-board {
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    gap: 10px; margin: 0 auto 30px; width: 100%; aspect-ratio: 1;
}
.cell {
    background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px; display: flex; justify-content: center; align-items: center;
    font-size: 60px; font-weight: 900; line-height: 1;
    cursor: pointer; position: relative; overflow: hidden;
    width: 100%; height: 100%; transition: 0.2s;
}
.cell:not(.taken):hover { background: rgba(255, 255, 255, 0.08); transform: scale(1.02); border-color: rgba(255, 255, 255, 0.3); z-index: 1; }
.cell.taken { cursor: default; }
.cell.x { color: var(--primary-x); text-shadow: var(--neon-shadow-x); }
.cell.o { color: var(--primary-o); text-shadow: var(--neon-shadow-o); }
.cell.fading { animation: pulse-fade 1s infinite alternate; }
.cell.fading::after { content: '消滅'; position: absolute; font-size: 10px; bottom: 5px; color: rgba(255,255,255,0.7); font-family: 'Noto Sans JP'; font-weight: bold; }
@keyframes pulse-fade { 0% { opacity: 1; border-color: rgba(255,255,255,0.1); } 100% { opacity: 0.3; border-color: #ff0000; } }

#status-display { font-size: 14px; color: #888; margin-bottom: 20px; font-family: 'Noto Sans JP'; min-height: 24px; font-weight: bold; }

/* --- ゲーム中ボタン --- */
.ingame-buttons { display: flex; justify-content: center; gap: 10px; }
.ingame-buttons button {
    background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold);
    padding: 10px 20px; font-family: 'Orbitron', 'Noto Sans JP'; font-size: 14px;
    cursor: pointer; transition: 0.3s;
    text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
}
.ingame-buttons button:hover { background: var(--accent-gold); color: #000; box-shadow: 0 0 20px var(--accent-gold); }
#back-to-menu-button { border-color: #666; color: #888; }
#back-to-menu-button:hover { background: #666; color: #fff; box-shadow: none; }

#menu-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10, 11, 16, 0.95);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    z-index: 20; backdrop-filter: blur(10px); border-radius: 20px;
    padding: 20px; box-sizing: border-box;
}
.menu-btn {
    background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold);
    padding: 12px 30px; font-family: 'Orbitron', 'Noto Sans JP'; font-size: 14px;
    cursor: pointer; transition: 0.3s; margin: 10px 0; width: 80%;
    text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
}
.menu-btn:hover { background: var(--accent-gold); color: #000; box-shadow: 0 0 20px var(--accent-gold); }
.menu-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; box-shadow: none; background: transparent; }
input[type="text"] {
    background: rgba(0,0,0,0.5); border: 1px solid #555; color: white;
    padding: 10px; font-family: 'Roboto Mono'; width: 70%; text-align: center;
    margin-bottom: 10px; font-size: 16px;
}
#id-display-area { display: none; margin-top: 10px; padding: 10px; border: 1px dashed #555; color: var(--primary-x); word-break: break-all; user-select: text; font-family: 'Roboto Mono'; }
.copy-hint { font-size: 10px; color: #888; display: block; margin-top: 5px; font-family: 'Noto Sans JP'; }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div class="container" id="game-container">
    
    <!-- Connection Menu -->
    <div id="menu-overlay">
        <h2 style="color: white; margin-bottom: 20px; font-family: 'Orbitron';">ラインヴァニッシュ<br><span style="font-size: 0.5em;">消える体力制マルバツゲーム</span></h2>
        
        <div id="init-menu">
            <button class="menu-btn" id="btn-create">ルームを作成 (ホスト)</button>
            <div style="margin: 10px; color: #555; font-size: 12px;">または</div>
            <input type="text" id="join-id-input" placeholder="ホストIDを入力">
            <button class="menu-btn" id="btn-join">ルームに参加</button>
            <div style="margin: 10px; color: #555; font-size: 12px;">または</div>
            <button class="menu-btn" id="btn-local" style="border-color: #555; color: #888;">ひとりで遊ぶ (オフライン)</button>
        </div>

        <div id="host-menu" style="display:none; width: 100%;">
            <p style="font-family:'Noto Sans JP'; font-size:14px;">以下のIDを対戦相手に伝えてください:</p>
            <div id="id-display-area">生成中...</div>
            <p style="color: var(--accent-gold); font-size: 12px; margin-top: 20px; font-family:'Noto Sans JP';" class="blink">対戦相手の接続を待機中...</p>
            <button class="menu-btn" id="btn-back" style="margin-top: 20px; font-size: 12px;">キャンセル</button>
        </div>

        <div id="loading-menu" style="display:none;">
            <p class="blink" style="font-family:'Noto Sans JP';">接続中...</p>
        </div>
    </div>

    <h1>Neo Tactics</h1>

    <div class="hud">
        <div class="player-stats active-x" id="stats-x">
            <span class="p-name p-x">プレイヤー X <span id="you-x" class="you-indicator">あなた</span></span>
            <div class="hp-bar-container"><div class="hp-bar hp-x" id="hp-bar-x"></div></div>
        </div>
        <!-- タイマー表示エリアを追加 -->
        <div id="timer-display" class="timer">--</div>
        <div class="player-stats" id="stats-o">
            <span class="p-name p-o">プレイヤー O <span id="you-o" class="you-indicator">あなた</span></span>
            <div class="hp-bar-container"><div class="hp-bar hp-o" id="hp-bar-o"></div></div>
        </div>
    </div>

    <div id="status-display">システム待機中...</div>

    <div id="game-board"></div>

    <!-- ゲーム中メニューボタンを追加 -->
    <div class="ingame-buttons">
        <button id="reset-button" style="display:none;">再戦</button>
        <button id="back-to-menu-button" style="display:none;">撤退</button>
    </div>
</div>
<script>
/* main.js (完全版) */

// --- Audio System ---
class AudioController {
    constructor() { this.ctx = null; }
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    playTone(freq, type, duration, vol = 0.1) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    }
    playClick() { this.playTone(1200, 'sine', 0.1, 0.05); }
    playPlace(player) {
        const baseFreq = player === 'X' ? 440 : 550;
        this.playTone(baseFreq, 'triangle', 0.3, 0.1);
        setTimeout(() => this.playTone(baseFreq * 1.5, 'sine', 0.4, 0.05), 50);
    }
    playVanish() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.setValueAtTime(300, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.3);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.3);
    }
    playDamage() { this.playTone(100, 'sawtooth', 0.4, 0.2); this.playTone(80, 'square', 0.4, 0.2); }
    playWin() {
        [523.25, 659.25, 783.99, 1046.50].forEach((n, i) => setTimeout(() => this.playTone(n, 'triangle', 0.6, 0.1), i * 150));
    }
}

// --- Game Logic ---
document.addEventListener('DOMContentLoaded', () => {
    const audio = new AudioController();
    
    // --- UI Elements ---
    const statusDisplay = document.getElementById('status-display');
    const resetButton = document.getElementById('reset-button');
    const backToMenuButton = document.getElementById('back-to-menu-button');
    const container = document.getElementById('game-container');
    const hpBarX = document.getElementById('hp-bar-x');
    const hpBarO = document.getElementById('hp-bar-o');
    const statsX = document.getElementById('stats-x');
    const statsO = document.getElementById('stats-o');
    const timerDisplay = document.getElementById('timer-display');
    const menuOverlay = document.getElementById('menu-overlay');
    const initMenu = document.getElementById('init-menu');
    const hostMenu = document.getElementById('host-menu');
    const loadingMenu = document.getElementById('loading-menu');
    const idDisplay = document.getElementById('id-display-area');
    const joinInput = document.getElementById('join-id-input');
    const youX = document.getElementById('you-x');
    const youO = document.getElementById('you-o');
    const board = document.getElementById('game-board');

    // --- State ---
    let gameState = Array(9).fill("");
    let currentPlayer = "X";
    let gameActive = false;
    const MAX_HP = 3;
    let hp = { "X": MAX_HP, "O": MAX_HP };
    let moves = { "X": [], "O": [] };
    
    // --- Timer State ---
    const TIME_LIMIT = 15;
    let currentTimer = TIME_LIMIT;
    let timerInterval = null;

    // --- Network State ---
    let peer = null;
    let conn = null;
    let mySide = null;
    let isHost = false;

    // --- Board Initialization ---
    for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.dataset.index = i;
        cell.addEventListener('click', () => handleInput(i));
        cell.addEventListener('mouseenter', () => { if(isMyTurn()) audio.playClick(); });
        board.appendChild(cell);
    }
    const cells = document.querySelectorAll('.cell');

    // --- Menu Event Listeners ---
    document.getElementById('btn-create').addEventListener('click', initHost);
    document.getElementById('btn-join').addEventListener('click', initJoin);
    document.getElementById('btn-local').addEventListener('click', startLocalGame);
    document.getElementById('btn-back').addEventListener('click', () => location.reload());
    resetButton.addEventListener('click', requestRematch);
    backToMenuButton.addEventListener('click', toTitle);

    // --- Timer Functions ---
    function startTimer() {
        stopTimer(); // 既存のタイマーをクリア
        currentTimer = TIME_LIMIT;
        updateTimerDisplay();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function updateTimer() {
        currentTimer--;
        updateTimerDisplay();
        if (currentTimer <= 0) {
            stopTimer();
            const winner = currentPlayer === 'X' ? 'O' : 'X';
            endGame(`時間切れ！ プレイヤー ${winner} の勝利！`);
        }
    }
    
    function updateTimerDisplay() {
        timerDisplay.textContent = currentTimer;
        if (currentTimer <= 5) {
            timerDisplay.classList.add('warning');
        } else {
            timerDisplay.classList.remove('warning');
        }
    }
    
    // --- Network Functions ---
    function initHost() {
        audio.init();
        initMenu.style.display = 'none';
        hostMenu.style.display = 'block';
        
        peer = new Peer();
        
        peer.on('open', (id) => {
            idDisplay.textContent = id;
            idDisplay.style.display = 'block';
            idDisplay.innerHTML += '<span class="copy-hint">IDをコピーして相手に送ってください</span>';
        });

        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
            isHost = true;
            mySide = 'X';
            startGameOnline();
        });

        peer.on('error', (err) => alert("通信エラーが発生しました: " + err));
    }

    function initJoin() {
        const hostId = joinInput.value.trim();
        if(!hostId) return alert("ホストIDを入力してください");
        
        audio.init();
        initMenu.style.display = 'none';
        loadingMenu.style.display = 'block';

        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(hostId);
            setupConnection();
            isHost = false;
            mySide = 'O';
        });
        
        peer.on('error', (err) => {
            alert("接続に失敗しました。IDを確認してください。");
            location.reload();
        });
    }

    function setupConnection() {
        conn.on('open', () => {
            console.log("Connected!");
            if(!isHost) startGameOnline();
        });

        conn.on('data', (data) => {
            console.log("Received:", data);
            if (data.type === 'move') {
                executeMove(data.index, false);
            } else if (data.type === 'rematch') {
                resetGameLogic();
                updateStatus("対戦相手が再戦を承諾しました");
            }
        });
        
        conn.on('close', () => {
            alert("対戦相手が切断しました。");
            location.reload();
        });
    }

    // --- Game Start Functions ---
    function startLocalGame() {
        audio.init();
        menuOverlay.style.display = 'none';
        mySide = 'LOCAL';
        gameActive = true;
        backToMenuButton.style.display = 'inline-block';
        resetGameLogic();
    }

    function startGameOnline() {
        menuOverlay.style.display = 'none';
        gameActive = true;
        resetButton.style.display = 'none';
        backToMenuButton.style.display = 'inline-block';
        
        if(mySide === 'X') youX.style.display = 'inline-block';
        if(mySide === 'O') youO.style.display = 'inline-block';
        
        updateStatus(mySide === 'X' ? "接続完了。あなたの番です。" : "接続完了。相手の番です。");
        resetGameLogic();
    }

    function requestRematch() {
        if (mySide === 'LOCAL') {
            resetGameLogic();
        } else {
            if(conn && conn.open) {
                conn.send({ type: 'rematch' });
                resetGameLogic();
                updateStatus("再戦を開始します");
            }
        }
    }
    
    function isMyTurn() {
        if (!gameActive) return false;
        if (mySide === 'LOCAL') return true;
        return currentPlayer === mySide;
    }

    // --- Core Game Logic ---
    function handleInput(index) {
        if (!isMyTurn() || gameState[index] !== "" || !gameActive) return;
        
        const moveSuccess = executeMove(index, true);

        if (moveSuccess && mySide !== 'LOCAL' && conn && conn.open) {
            conn.send({ type: 'move', index: index });
        }
    }
    
    function executeMove(index, isLocalAction) {
        if (gameState[index] !== "") return false;

        handleCellPlayed(cells[index], index);
        checkResult();
        return true;
    }

    function handleCellPlayed(clickedCell, clickedCellIndex) {
        if (moves[currentPlayer].length >= 3) {
            const oldestMoveIndex = moves[currentPlayer].shift();
            const oldestCell = document.querySelector(`.cell[data-index='${oldestMoveIndex}']`);
            gameState[oldestMoveIndex] = "";
            if(oldestCell) {
                oldestCell.textContent = "";
                oldestCell.className = "cell";
            }
            audio.playVanish();
        }
        
        gameState[clickedCellIndex] = currentPlayer;
        clickedCell.textContent = currentPlayer;
        clickedCell.classList.add('taken', currentPlayer.toLowerCase());
        moves[currentPlayer].push(clickedCellIndex);
        audio.playPlace(currentPlayer);
    }

    function checkResult() {
        let linesCompleted = 0;
        const winConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        winConditions.forEach(condition => {
            const [a, b, c] = condition;
            if (gameState[a] === currentPlayer && gameState[b] === currentPlayer && gameState[c] === currentPlayer) {
                linesCompleted++;
            }
        });

        if (linesCompleted > 0) {
            applyDamage(linesCompleted);
        } else {
            changePlayer();
        }
    }

    function applyDamage(dmg) {
        const opponent = currentPlayer === "X" ? "O" : "X";
        hp[opponent] -= dmg;
        if (hp[opponent] < 0) hp[opponent] = 0;
        
        updateHPVisuals();
        audio.playDamage();

        if (hp[opponent] <= 0) {
            endGame(`プレイヤー ${currentPlayer} の勝利！`);
        } else {
            updateStatus(`クリティカル！ ${dmg} ダメージ！`);
            setTimeout(changePlayer, 1000);
        }
    }
    
    function changePlayer() {
        if (!gameActive) return;
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        updateTurnIndicator();
        highlightFadingCell();
        
        if (mySide === 'LOCAL') {
            updateStatus(`プレイヤー ${currentPlayer} のターン`);
            startTimer();
        } else {
            if(currentPlayer === mySide) {
                updateStatus("あなたのターン");
                container.style.borderColor = mySide === 'X' ? 'var(--primary-x)' : 'var(--primary-o)';
            } else {
                updateStatus("相手のターン (待機中)");
                container.style.borderColor = 'var(--glass-border)';
            }
        }
    }

    function endGame(message) {
        gameActive = false;
        stopTimer();
        timerDisplay.classList.remove('warning');
        updateStatus(message);
        audio.playWin();
        resetButton.style.display = 'inline-block';
        backToMenuButton.style.display = 'none';
    }
    
    function resetGameLogic() {
        gameActive = true;
        currentPlayer = "X";
        gameState.fill("");
        moves = { "X": [], "O": [] };
        hp = { "X": MAX_HP, "O": MAX_HP };
        
        cells.forEach(c => { c.textContent = ""; c.className = "cell"; });
        
        updateHPVisuals();
        updateTurnIndicator();
        resetButton.style.display = 'none';
        backToMenuButton.style.display = 'inline-block';
        
        if(mySide === 'LOCAL') {
            updateStatus("プレイヤー X のターン");
            startTimer();
        } else {
            if(currentPlayer === mySide) {
                updateStatus("あなたのターン");
                container.style.borderColor = mySide === 'X' ? 'var(--primary-x)' : 'var(--primary-o)';
            } else {
                updateStatus("相手のターン (待機中)");
                container.style.borderColor = 'rgba(255,255,255,0.1)';
            }
        }
    }
    
    function toTitle() {
        stopTimer();
        gameActive = false;
        
        if (conn) conn.close();
        if (peer) peer.destroy();
        peer = null;
        conn = null;

        menuOverlay.style.display = 'flex';
        initMenu.style.display = 'block';
        hostMenu.style.display = 'none';
        
        document.querySelectorAll('.you-indicator').forEach(el => el.style.display = 'none');
        resetButton.style.display = 'none';
        backToMenuButton.style.display = 'none';
        timerDisplay.textContent = '--';
        timerDisplay.classList.remove('warning');
    }

    // --- Visual Helper Functions ---
    function updateStatus(msg) {
        statusDisplay.textContent = msg;
    }

    function updateHPVisuals() {
        hpBarX.style.width = `${(hp.X / MAX_HP) * 100}%`;
        hpBarO.style.width = `${(hp.O / MAX_HP) * 100}%`;
    }

    function updateTurnIndicator() {
        statsX.classList.toggle('active-x', currentPlayer === 'X');
        statsO.classList.toggle('active-o', currentPlayer === 'O');
    }

    function highlightFadingCell() {
        cells.forEach(c => c.classList.remove('fading'));
        if (moves[currentPlayer].length >= 3) {
            const fadingIndex = moves[currentPlayer][0];
            const fadingCell = cells[fadingIndex];
            if (fadingCell) fadingCell.classList.add('fading');
        }
    }
});
</script>
</body>
</html>
